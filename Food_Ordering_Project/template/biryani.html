<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Details</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        table {
            border-collapse: collapse;
            margin: auto;
            width: 500px;
            background-color: #fff;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        .title {
            background-color: #2c3e50;
            color: white;
            font-size: 26px;
            padding: 15px;
        }

        input, select {
            width: 85%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #3498db;
        }

        .btn {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        .msg {
            color: green;
            font-size: 18px;
        }

        .header-row {
            background-color: #ecf0f1;
            font-size: 18px;
            font-weight: bold;
        }

        .table-gap {
            margin-top: 40px;
        }
    </style>

</head>

<body>

<form action="{% url 'add_biryani' %}" method="post">
    {% csrf_token %}
    
    <table>
        <tr>
            <th class="title">Add Food Item</th>
        </tr>

        <tr>
            <th>
                <input type="text" placeholder="Enter Food Name" name="name" required>
            </th>
        </tr>

        <tr>
            <th>
                <label>Select Food Type</label><br><br>
                <select name="id" multiple>
                    {% for x in btypes %}
                    <option>{{ x.name }}</option>
                    {% endfor %}
                </select>
            </th>
        </tr>

        <tr>
            <th>
                <input type="number" placeholder="Enter Price" name="price" required>
            </th>
        </tr>

        <tr>
            <th>
                <button type="submit" class="btn">Save</button>
            </th>
        </tr>

        {% for x in messages %}
        <tr>
            <th class="msg">{{ x }}</th>
        </tr>
        {% endfor %}
    </table>
</form>

<br><br>

<table class="table-gap">
    <tr>
        <th colspan="4" class="title">Food Details</th>
    </tr>

    <tr class="header-row">
        <th>Number</th>
        <th>Name</th>
        <th>Food Type</th>
        <th>Price</th>
    </tr>

    {% for x in biryani %}
    <tr>
      <td>{{ forloop.counter }}</td>
      <td>{{ x.name }}</td>
      <td>{{ x.biryani_Type }}</td>
      <td>{{ x.price }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
